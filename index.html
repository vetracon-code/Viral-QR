<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral QR</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; }
        #timer { font-size: 3.5rem; color: #38bdf8; margin: 20px 0; font-weight: bold; }
        .btn { width: 100%; padding: 15px; background: #ec4899; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        #qrcode { margin-top: 25px; padding: 10px; background: white; display: inline-block; border-radius: 10px; }
        #qrcode canvas { width: 180px !important; height: 180px !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Viral QR</h1>
        <div id="timer">00:00</div>
        <button class="btn" onclick="startTimer()">AVVIA IL GIOCO</button>
        <div id="qrcode"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        const socket = io();
        QRCode.toCanvas(document.getElementById('qrcode'), window.location.href);
        function startTimer() { socket.emit('createMaster', 60); }
        socket.on('timerStarted', (endTime) => {
            setInterval(() => {
                const diff = endTime - Date.now();
                if (diff <= 0) { document.getElementById('timer').innerText = "FINE"; return; }
                const min = Math.floor(diff / 60000);
                const sec = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = min + ":" + (sec < 10 ? '0' : '') + sec;
            }, 1000);
        });
    </script>
</body>
</html>
