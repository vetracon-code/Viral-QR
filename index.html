<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral QR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin:0; background: #f0f2f5; }
        .header { background: #075E54; color: white; padding: 15px; text-align: center; }
        #map { height: 250px; width: 100%; }
        .content { padding: 15px; text-align: center; }
        .admin-box { background: #334155; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        .btn { background: #25D366; color: white; border: none; padding: 12px; width: 100%; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="event-title" style="margin:0">Viral Zone</h2>
        <div id="timer-display" style="font-weight:bold; color:#ffeb3b">ATTESA...</div>
    </div>
    <div id="map"></div>
    <div class="content">
        <div id="admin-section" class="admin-box hidden">
            <input type="text" id="adm-name" placeholder="Nome Evento" style="width:100%; margin-bottom:5px;">
            <input type="number" id="adm-val" value="1" style="width:45%;">
            <select id="adm-unit" style="width:45%;"><option value="min">Min</option><option value="ore">Ore</option></select>
            <button class="btn" style="margin-top:10px; background:#1e293b" onclick="startGlobalGame()">AVVIA GIOCO</button>
        </div>
        <div id="reg-section">
            <input type="text" id="nickname" placeholder="Tuo Nickname" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
            <button class="btn" onclick="registerUser()">ENTRA NEL RADAR</button>
        </div>
        <div id="profile-section" class="hidden"><h3>Sei attivo!</h3></div>
        <div id="end-message" class="hidden"><h2>FINE GIOCO - DATI CANCELLATI</h2></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const socket = io();
        let map = L.map('map').setView([45.46, 9.19], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        if (new URLSearchParams(window.location.search).has('admin')) document.getElementById('admin-section').classList.remove('hidden');
        function startGlobalGame() {
            socket.emit('adminStart', { name: document.getElementById('adm-name').value, value: document.getElementById('adm-val').value, unit: document.getElementById('adm-unit').value });
        }
        function registerUser() {
            navigator.geolocation.getCurrentPosition(pos => {
                socket.emit('registerUser', { nick: document.getElementById('nickname').value, lat: pos.coords.latitude, lng: pos.coords.longitude });
                document.getElementById('reg-section').classList.add('hidden');
                document.getElementById('profile-section').classList.remove('hidden');
            });
        }
        socket.on('timerStarted', d => {
            document.getElementById('event-title').innerText = d.name;
            setInterval(() => {
                const diff = d.endTime - Date.now();
                if(diff<=0) { document.getElementById('timer-display').innerText="FINITO"; return; }
                const m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('timer-display').innerText = m + ":" + (s<10?'0':'') + s;
            }, 1000);
        });
        socket.on('gameDeleted', () => { location.reload(); });
    </script>
</body>
</html>
