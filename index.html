<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #D4AF37; --primary: #1A237E; --danger: #C62828; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; margin:0; background: var(--bg); color: #222; text-align: center; }
        .header { background: var(--primary); color: white; padding: 10px; position: sticky; top:0; z-index: 1000; }
        
        /* Dashboard Layout */
        .player-profile { padding: 20px; background: white; border-bottom: 3px solid var(--accent); }
        .qr-wrapper { position: relative; display: inline-block; margin: 20px 0; background: white; padding: 10px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #qr-canvas { width: 180px !important; height: 180px !important; }
        
        /* Like Stats attorno al QR */
        .stat-badge { position: absolute; background: white; border: 1px solid #ddd; border-radius: 50px; padding: 5px 12px; font-size: 0.8rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .s-tl { top: -10px; left: -30px; }
        .s-tr { top: -10px; right: -30px; }
        .s-ml { top: 82px; left: -42px; }
        .s-mr { top: 82px; right: -42px; }
        .s-bl { bottom: -10px; left: -30px; }
        .s-br { bottom: -10px; right: -30px; }

        /* Liste Notifiche */
        #notif-list { max-width: 400px; margin: 10px auto; background: #fff; border-radius: 10px; text-align: left; max-height: 200px; overflow-y: auto; }
        .notif-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-reply { background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }

        #map { height: 250px; width: 100%; margin-top: 20px; }
        .content { padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; }
        .btn-gold { background: var(--accent); }
        .hidden { display: none; }
        
        /* Overlay Interazioni */
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; }
        .interaction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn-int { padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: #f8f9fa; font-size: 0.85rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="scanner-container" class="hidden">
            <div id="reader" style="width:300px"></div>
        </div>
        <div id="interaction-menu" style="width: 100%;">
            <h3 id="reply-to-label">Invia a:</h3>
            <div class="interaction-grid">
                <button class="btn-int" onclick="sendInteraction('Mi piaci ❤️')">Mi piaci</button>
                <button class="btn-int" onclick="sendInteraction('Non mi piaci 👎')">Non mi piaci</button>
                <button class="btn-int" onclick="sendInteraction('Mi sei simpatico 😊')">Mi sei simpatico</button>
                <button class="btn-int" onclick="sendInteraction('Applauso 👏')">Applauso</button>
                <button class="btn-int" onclick="sendInteraction('Ti trovo interessante 🤔')">Ti trovo interessante</button>
                <button class="btn-int" onclick="sendInteraction('Prendiamo un caffè? ☕')">Prendiamo un caffè</button>
                <button class="btn-int" onclick="sendInteraction('Brindiamo! 🥂')">Brindiamo</button>
                <button class="btn-int" onclick="sendInteraction('Mi piaci tanto 😍')">Mi piaci tanto</button>
            </div>
        </div>
        <button class="btn" style="background:#666; margin-top:20px;" onclick="closeOverlay()">CHIUDI</button>
    </div>

    <div class="header">
        <h2 id="display-title" style="margin:0; font-size: 1.1rem;">LUMINA</h2>
    </div>

    <div class="content">
        <div id="admin-setup" class="card hidden">
            <h3>Setup Host</h3>
            <input type="text" id="adm-event-name" placeholder="Nome Evento" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn btn-gold" onclick="activateArea()">ATTIVA AREA GIOCO</button>
            <div id="admin-join-section" class="hidden">
                <input type="text" id="adm-nick" placeholder="Tuo Nickname" style="width:100%; padding:10px; margin-bottom:10px;">
                <button class="btn" style="background:#28a745" onclick="joinGame('admin')">ENTRA NEL GIOCO</button>
            </div>
        </div>

        <div id="player-reg" class="card">
            <h3>Benvenuto</h3>
            <input type="text" id="nickname" placeholder="Tuo Nickname" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn btn-gold" onclick="joinGame('player')">ENTRA NEL GIOCO</button>
        </div>

        <div id="main-dashboard" class="hidden">
            <div class="player-profile">
                <h3 id="user-hello" style="margin:0"></h3>
                
                <div class="qr-wrapper">
                    <canvas id="qr-canvas"></canvas>
                    <div class="stat-badge s-tl" onclick="showLikers('Mi sei simpatico 😊')">😊 <span id="count-friendly">0</span></div>
                    <div class="stat-badge s-tr" onclick="showLikers('Ti trovo interessante 🤔')">🤔 <span id="count-interesting">0</span></div>
                    <div class="stat-badge s-ml" onclick="showLikers('Prendiamo un caffè? ☕')">☕ <span id="count-coffee">0</span></div>
                    <div class="stat-badge s-mr" onclick="showLikers('Brindiamo! 🥂')">🥂 <span id="count-cheers">0</span></div>
                    <div class="stat-badge s-bl" onclick="showLikers('Applauso 👏')">👏 <span id="count-clap">0</span></div>
                    <div class="stat-badge s-br" onclick="showLikers('Mi piaci ❤️')">❤️ <span id="count-like">0</span></div>
                </div>

                <div id="notif-list" class="hidden"></div>
                
                <button class="btn btn-gold" onclick="startScanner()" style="margin-top:10px;">SCANNERIZZA QUALCUNO</button>
                <div id="admin-powers" class="hidden">
                    <button class="btn" style="background:var(--danger); font-size:0.8rem; padding:8px" onclick="resetAll()">RESET SESSIONE</button>
                </div>
            </div>

            <div id="map"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const socket = io();
        let myId, markers = {}, html5QrCode, currentTargetId;
        let interactionsReceived = [];

        const map = L.map('map', { zoomControl: false }).setView([45.4642, 9.19], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        if (window.location.search.includes('admin')) {
            document.getElementById('admin-setup').classList.remove('hidden');
            document.getElementById('player-reg').classList.add('hidden');
        }

        function activateArea() {
            navigator.geolocation.getCurrentPosition(p => {
                const name = document.getElementById('adm-event-name').value || "Lumina";
                socket.emit('adminStart', { name, value: 60, unit: "min", lat: p.coords.latitude, lng: p.coords.longitude });
                document.getElementById('admin-join-section').classList.remove('hidden');
            });
        }

        function joinGame(type) {
            const nick = document.getElementById(type === 'admin' ? 'adm-nick' : 'nickname').value || "Player";
            navigator.geolocation.getCurrentPosition(p => {
                socket.emit('registerUser', { nick, lat: p.coords.latitude, lng: p.coords.longitude });
                document.getElementById(type === 'admin' ? 'admin-setup' : 'player-reg').classList.add('hidden');
                map.setView([p.coords.latitude, p.coords.longitude], 16);
            });
        }

        socket.on('profileCreated', d => {
            myId = d.id;
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-hello').innerText = d.user.nick;
            if(window.location.search.includes('admin')) document.getElementById('admin-powers').classList.remove('hidden');
            QRCode.toCanvas(document.getElementById('qr-canvas'), window.location.origin + "/?target=" + myId);
        });

        socket.on('receiveLike', d => {
            interactionsReceived.push(d);
            updateCounters();
        });

        function updateCounters() {
            document.getElementById('count-friendly').innerText = interactionsReceived.filter(i => i.type.includes('😊')).length;
            document.getElementById('count-interesting').innerText = interactionsReceived.filter(i => i.type.includes('🤔')).length;
            document.getElementById('count-coffee').innerText = interactionsReceived.filter(i => i.type.includes('☕')).length;
            document.getElementById('count-cheers').innerText = interactionsReceived.filter(i => i.type.includes('🥂')).length;
            document.getElementById('count-clap').innerText = interactionsReceived.filter(i => i.type.includes('👏')).length;
            document.getElementById('count-like').innerText = interactionsReceived.filter(i => i.type.includes('❤️')).length + interactionsReceived.filter(i => i.type.includes('😍')).length;
        }

        function showLikers(type) {
            const list = document.getElementById('notif-list');
            const filtered = interactionsReceived.filter(i => i.type === type);
            list.innerHTML = filtered.length ? `<p style="padding:10px; font-weight:bold; margin:0; border-bottom:1px solid #eee">Hanno inviato ${type}:</p>` : "";
            filtered.forEach(i => {
                list.innerHTML += `<div class="notif-item">
                    <span>${i.fromNick || 'Anonimo'}</span>
                    <button class="btn-reply" onclick="prepareReply('${i.from}')">RICAMBIA</button>
                </div>`;
            });
            list.classList.toggle('hidden');
        }

        function prepareReply(id) {
            currentTargetId = id;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('scanner-container').classList.add('hidden');
            document.getElementById('reply-to-label').innerText = "Ricambia il messaggio:";
        }

        function startScanner() {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('scanner-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                currentTargetId = new URL(text).searchParams.get("target");
                html5QrCode.stop();
                document.getElementById('scanner-container').classList.add('hidden');
            });
        }

        function sendInteraction(type) {
            if (!currentTargetId) {
                alert("Prima scannerizza un QR valido.");
                return;
            }
            socket.emit('sendLike', { to: currentTargetId, from: myId, type: type });
            closeOverlay();
            alert("Inviato!");
        }

        socket.on('interactionError', d => {
            alert((d && d.message) ? d.message : "Interazione non riuscita.");
        });

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
            if(html5QrCode) try { html5QrCode.stop(); } catch(e){}
        }

        socket.on('updateMap', users => {
            Object.values(users).forEach(u => {
                if(u.id !== socket.id) {
                    if(markers[u.id]) markers[u.id].setLatLng([u.lat, u.lng]);
                    else markers[u.id] = L.marker([u.lat, u.lng]).addTo(map).bindPopup(u.nick);
                }
            });
        });

        function resetAll() { if(confirm("RESET?")) socket.emit('adminRequestReset'); }
        socket.on('gameDeleted', () => location.href = window.location.origin + (window.location.search.includes('admin') ? "?admin=1" : ""));
    </script>
</body>
</html>
