<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral QR | Exclusive Social Experience</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --accent: #00ffa3;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .header {
            padding: 25px 15px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h2 {
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #timer-display {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            color: var(--accent);
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 163, 0.5);
        }

        #map { 
            height: 350px; 
            width: 100%; 
            filter: invert(100%) hue-rotate(180deg) brightness(0.8) contrast(1.2);
            opacity: 0.9;
        }

        .content { padding: 20px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h3 { font-weight: 300; letter-spacing: 1px; }

        input, select {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 163, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent), #00d1ff);
            color: #000;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        /* Overlay Premium */
        #qr-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        #big-qr {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 40px var(--accent);
        }

        .admin-box {
            background: rgba(0, 255, 163, 0.05);
            border: 1px solid var(--accent);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="qr-overlay" onclick="this.style.display='none'">
        <h2 style="margin-bottom:30px">YOUR PASS</h2>
        <div id="big-qr"></div>
        <p style="margin-top:40px; opacity:0.5">Tocca per chiudere</p>
    </div>

    <div class="app-container">
        <div class="header">
            <h2 id="event-title">Viral Radar</h2>
            <div id="timer-display">SYNCING...</div>
        </div>
        
        <div id="map"></div>

        <div class="content">
            <div id="admin-section" class="admin-box hidden">
                <h4 style="margin:0 0 15px 0; color:var(--accent)">ADMIN CONSOLE</h4>
                <input type="text" id="adm-event-name" placeholder="Nome dell'Evento Premium">
                <input type="text" id="adm-address" placeholder="Location (Indirizzo)">
                <input type="text" id="adm-nick" placeholder="Tuo Nickname">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="adm-val" value="60">
                    <select id="adm-unit"><option value="min">Minuti</option><option value="ore">Ore</option></select>
                </div>
                <button class="btn" onclick="adminStartAndJoin()">START PRIVATE GAME</button>
            </div>

            <div id="reg-section">
                <div class="card">
                    <h3>Private Access</h3>
                    <p style="opacity:0.6; font-size:0.8rem; margin-bottom:20px">Inserisci un nickname per apparire nel radar.</p>
                    <input type="text" id="nickname" placeholder="Username">
                    <button class="btn" onclick="registerUser()">ENTRA NEL GIOCO</button>
                </div>
            </div>

            <div id="profile-section" class="hidden">
                <div class="card">
                    <h2 id="user-display-name" style="margin-top:0"></h2>
                    <p style="color:var(--accent)">ONLINE</p>
                    <button class="btn" onclick="showBigQR()" style="margin-top:10px">MY QR PASS 📱</button>
                    <button class="btn btn-secondary" onclick="shareWA()" style="margin-top:10px">INVITE FRIENDS 💬</button>
                    
                    <button id="admin-reset-btn" class="btn hidden" style="background:#ef4444; margin-top:40px; color:white;" onclick="triggerFullReset()">CLOSE SESSION</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const socket = io();
        let map, myMarker, isAdmin = false;
        let otherMarkers = {};

        // Mappa stile Dark
        map = L.map('map', { zoomControl: false }).setView([45.4642, 9.1900], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        if (new URLSearchParams(window.location.search).has('admin')) {
            isAdmin = true;
            document.getElementById('admin-section').classList.remove('hidden');
            document.getElementById('reg-section').classList.add('hidden');
        }

        async function adminStartAndJoin() {
            const address = document.getElementById('adm-address').value;
            let lat, lng;
            if (address) {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (data.length > 0) { lat = parseFloat(data[0].lat); lng = parseFloat(data[0].lon); }
            }
            if (!lat) {
                navigator.geolocation.getCurrentPosition(pos => {
                    executeStart(pos.coords.latitude, pos.coords.longitude);
                });
            } else { executeStart(lat, lng); }
        }

        function executeStart(lat, lng) {
            socket.emit('adminStart', { 
                name: document.getElementById('adm-event-name').value || "Exclusive Event", 
                value: document.getElementById('adm-val').value, 
                unit: document.getElementById('adm-unit').value,
                lat: lat, lng: lng 
            });
            socket.emit('registerUser', { nick: document.getElementById('adm-nick').value || "Owner", lat: lat, lng: lng });
            document.getElementById('admin-section').classList.add('hidden');
            map.setView([lat, lng], 16);
        }

        function registerUser() {
            const nick = document.getElementById('nickname').value || "Guest";
            navigator.geolocation.getCurrentPosition(pos => {
                socket.emit('registerUser', { nick: nick, lat: pos.coords.latitude, lng: pos.coords.longitude });
                document.getElementById('reg-section').classList.add('hidden');
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            });
        }

        socket.on('profileCreated', (data) => {
            document.getElementById('profile-section').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = data.user.nick;
            if(isAdmin) document.getElementById('admin-reset-btn').classList.remove('hidden');
            QRCode.toCanvas(document.getElementById('big-qr'), window.location.origin + "/?target=" + socket.id, { width: 250 });
        });

        socket.on('updateMap', users => {
            Object.values(users).forEach(u => {
                if(u.id !== socket.id) {
                    if(otherMarkers[u.id]) otherMarkers[u.id].setLatLng([u.lat, u.lng]);
                    else {
                        const icon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div style="background-color:var(--accent); width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 10px var(--accent);"></div>`,
                            iconSize: [12, 12]
                        });
                        otherMarkers[u.id] = L.marker([u.lat, u.lng], {icon: icon}).addTo(map).bindPopup(u.nick);
                    }
                }
            });
        });

        socket.on('timerStarted', d => {
            document.getElementById('event-title').innerText = d.name;
            setInterval(() => {
                const diff = d.endTime - Date.now();
                if(diff <= 0) { document.getElementById('timer-display').innerText = "SESSION ENDED"; return; }
                const m = Math.floor((diff%3600000)/60000);
                const s = Math.floor((diff%60000)/1000);
                document.getElementById('timer-display').innerText = m + ":" + (s < 10 ? '0' : '') + s;
            }, 1000);
        });

        socket.on('gameDeleted', () => { location.href = window.location.origin + (isAdmin ? "?admin=1" : ""); });
        function triggerFullReset() { if(confirm("Reset entire session?")) socket.emit('adminRequestReset'); }
        function showBigQR() { document.getElementById('qr-overlay').style.display = 'flex'; }
        function shareWA() { window.open("https://wa.me/?text=" + encodeURIComponent("Join the exclusive radar: " + window.location.origin)); }
    </script>
</body>
</html>
