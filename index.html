<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral QR Game</title>
    <style>
        :root { --ws-green: #25D366; --ws-bg: #f0f2f5; --ws-dark: #075E54; }
        body { font-family: sans-serif; background: var(--ws-bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; }
        .header { background: var(--ws-dark); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .content { padding: 20px; text-align: center; }
        #timer-display { font-size: 2.5rem; font-weight: bold; color: #d32f2f; margin: 20px 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn-main { background: var(--ws-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 25px; font-weight: bold; cursor: pointer; }
        #qr-container { margin: 20px auto; padding: 10px; background: white; display: inline-block; border: 2px solid var(--ws-green); border-radius: 15px; }
        .reaction-bar { display: flex; justify-content: space-around; font-size: 1.5rem; margin-top: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">VIRAL QR GAME</div>
        <div class="content">
            <div id="timer-display">ATTESA AVVIO...</div>
            <div id="admin-section" class="card hidden">
                <h3>Admin</h3>
                <input type="number" id="duration-value" value="1">
                <select id="duration-unit"><option value="min">Minuti</option><option value="ore">Ore</option><option value="giorni">Giorni</option></select>
                <button class="btn-main" onclick="startGlobalGame()">AVVIA GIOCO</button>
            </div>
            <div id="reg-section" class="card">
                <h3>Benvenuto!</h3>
                <input type="text" id="nickname" placeholder="Nickname...">
                <button class="btn-main" onclick="registerUser()">ENTRA ❤️</button>
            </div>
            <div id="profile-section" class="hidden">
                <div class="card">
                    <h2 id="user-display-name"></h2>
                    <div id="qr-container"><canvas id="qrcode"></canvas></div>
                    <div class="reaction-bar"><span>❤️</span><span>🔥</span><span>🙌</span><span>😎</span><span>✨</span></div>
                </div>
            </div>
            <div id="game-ended" class="card hidden"><h2>FINE GIOCO</h2></div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <script>
        const socket = io();
        if (new URLSearchParams(window.location.search).has('admin')) document.getElementById('admin-section').classList.remove('hidden');
        function registerUser() {
            const nick = document.getElementById('nickname').value;
            if (!nick) return alert("Inserisci un nickname!");
            socket.emit('registerUser', { nick });
            document.getElementById('reg-section').classList.add('hidden');
            document.getElementById('profile-section').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = "Profilo di " + nick;
            QRCode.toCanvas(document.getElementById('qrcode'), window.location.origin, { width: 200 });
        }
        function startGlobalGame() {
            socket.emit('adminStart', { value: document.getElementById('duration-value').value, unit: document.getElementById('duration-unit').value });
        }
        socket.on('timerStarted', (endTime) => {
            setInterval(() => {
                const diff = endTime - Date.now();
                if (diff <= 0) { document.getElementById('timer-display').innerText = "00:00"; document.getElementById('profile-section').classList.add('hidden'); document.getElementById('game-ended').classList.remove('hidden'); return; }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = h + ":" + (m < 10 ? '0' : '') + m + ":" + (s < 10 ? '0' : '') + s;
            }, 1000);
        });
    </script>
</body>
</html>
