<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral QR Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --ws-green: #25D366; --ws-dark: #075E54; --ws-bg: #f0f2f5; --danger: #d32f2f; }
        body { font-family: sans-serif; margin:0; background: var(--ws-bg); }
        .header { background: var(--ws-dark); color: white; padding: 15px; text-align: center; position: sticky; top:0; z-index:1000; }
        #map { height: 300px; width: 100%; }
        .content { padding: 15px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .btn { background: var(--ws-green); color: white; border: none; padding: 12px; width: 100%; border-radius: 25px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-admin-reset { background: var(--danger); margin-top: 20px; font-size: 0.8rem; }
        .admin-box { background: #334155; color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        #qr-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <div id="qr-overlay" onclick="this.style.display='none'">
        <h2>Il Tuo Passaporto QR</h2>
        <div id="big-qr"></div>
        <p>Tocca per chiudere</p>
    </div>

    <div class="header">
        <h2 id="event-title" style="margin:0">Viral Radar</h2>
        <div id="timer-display" style="font-weight:bold; color:#ffeb3b">ATTESA...</div>
    </div>
    
    <div id="map"></div>

    <div class="content">
        <div id="admin-section" class="admin-box hidden">
            <h4>⚙️ Pannello Admin</h4>
            <input type="text" id="adm-event-name" placeholder="Nome dell'Evento">
            <input type="text" id="adm-nick" placeholder="Tuo Nickname">
            <div style="display:flex; gap:10px;">
                <input type="number" id="adm-val" value="60">
                <select id="adm-unit" style="padding:10px; border-radius:8px;"><option value="min">Minuti</option><option value="ore">Ore</option></select>
            </div>
            <button class="btn" style="background:#1e293b; border:1px solid white;" onclick="adminStartAndJoin()">AVVIA GIOCO ED ENTRA</button>
        </div>

        <div id="reg-section">
            <div class="card">
                <h3>Partecipa in Anonimato</h3>
                <input type="text" id="nickname" placeholder="Scegli un Nickname">
                <button class="btn" onclick="registerUser()">ENTRA NEL RADAR</button>
            </div>
        </div>

        <div id="profile-section" class="hidden">
            <div class="card">
                <h3 id="user-display-name"></h3>
                <button class="btn" onclick="showBigQR()">MOSTRA IL MIO QR 📱</button>
                <button class="btn" style="background:#128C7E" onclick="shareWA()">INVITA SU WHATSAPP 💬</button>
                
                <button id="admin-reset-btn" class="btn btn-admin-reset hidden" onclick="triggerFullReset()">🛑 RESETTA E CHIUDI GIOCO (ADMIN)</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const socket = io();
        let map, myMarker;
        let isAdmin = false;

        map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        if (new URLSearchParams(window.location.search).has('admin')) {
            isAdmin = true;
            document.getElementById('admin-section').classList.remove('hidden');
            document.getElementById('reg-section').classList.add('hidden');
        }

        function adminStartAndJoin() {
            const eventName = document.getElementById('adm-event-name').value || "Evento Viral";
            const nick = document.getElementById('adm-nick').value || "Admin";
            const val = document.getElementById('adm-val').value;
            const unit = document.getElementById('adm-unit').value;
            socket.emit('adminStart', { name: eventName, value: val, unit: unit });
            navigator.geolocation.getCurrentPosition(pos => {
                socket.emit('registerUser', { nick: nick, lat: pos.coords.latitude, lng: pos.coords.longitude });
                document.getElementById('admin-section').classList.add('hidden');
            });
        }

        function triggerFullReset() {
            if(confirm("Sei sicuro? Questo cancellerà tutti i dati di tutti i giocatori e tornerai alla schermata iniziale.")) {
                socket.emit('adminRequestReset');
            }
        }

        function registerUser() {
            const nick = document.getElementById('nickname').value || "Anonimo";
            navigator.geolocation.getCurrentPosition(pos => {
                socket.emit('registerUser', { nick: nick, lat: pos.coords.latitude, lng: pos.coords.longitude });
                document.getElementById('reg-section').classList.add('hidden');
            });
        }

        socket.on('profileCreated', (data) => {
            document.getElementById('profile-section').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = data.user.nick;
            if(isAdmin) document.getElementById('admin-reset-btn').classList.remove('hidden');
            QRCode.toCanvas(document.getElementById('big-qr'), window.location.origin + "/?target=" + socket.id, { width: 280 });
        });

        socket.on('gameDeleted', () => {
            alert("Il gioco è stato resettato dall'amministratore.");
            location.href = window.location.origin + (isAdmin ? "?admin=1" : "");
        });

        // Altre funzioni (updateMap, shareWA, etc) rimosse per brevità ma restano attive nel tuo codice
    </script>
</body>
</html>
