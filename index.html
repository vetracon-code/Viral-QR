<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral QR Social</title>
    <style>
        :root { --ws-green: #25D366; --ws-bg: #f0f2f5; --ws-dark: #075E54; }
        body { font-family: sans-serif; background: var(--ws-bg); margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--ws-dark); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .content { padding: 15px; text-align: center; }
        #timer-display { font-size: 2rem; font-weight: bold; color: #d32f2f; margin-bottom: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .btn-main { background: var(--ws-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        /* Sistema Reazioni */
        .reaction-grid { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .item { display: flex; flex-direction: column; align-items: center; cursor: pointer; background: #f8f9fa; padding: 8px; border-radius: 10px; min-width: 50px; }
        .item span { font-size: 1.5rem; }
        .count { font-size: 0.8rem; font-weight: bold; color: #555; }

        /* Log Interazioni */
        #interaction-log { text-align: left; font-size: 0.9rem; color: #666; max-height: 150px; overflow-y: auto; padding: 10px; background: #fff; border-radius: 10px; border: 1px solid #eee; }
        .log-entry { border-bottom: 1px solid #eee; padding: 5px 0; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">VIRAL QR SOCIAL</div>
        <div class="content">
            <div id="timer-display">00:00:00</div>

            <div id="reg-section" class="card">
                <input type="text" id="nickname" style="width:90%; padding:10px; margin-bottom:10px;" placeholder="Tuo Nickname...">
                <button class="btn-main" onclick="registerUser()">CREA PROFILO 👍</button>
            </div>

            <div id="profile-section" class="hidden">
                <div class="card">
                    <h3 id="user-display-name"></h3>
                    <div id="qr-container"><canvas id="qrcode"></canvas></div>
                    <div class="reaction-grid" id="reaction-display">
                        </div>
                </div>
                <h4>Attività in tempo reale</h4>
                <div id="interaction-log"></div>
            </div>

            <div id="admin-section" class="card hidden">
                <button onclick="socket.emit('adminStart', {value:10, unit:'min'})">Start 10 Min (Test)</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <script>
        const socket = io();
        let myProfile = null;
        const icons = ['👍', '❤️', '🔥', '🙌', '😎', '✨'];

        if (new URLSearchParams(window.location.search).has('admin')) document.getElementById('admin-section').classList.remove('hidden');

        function registerUser() {
            const nick = document.getElementById('nickname').value;
            if (!nick) return alert("Metti un nick!");
            socket.emit('registerUser', { nick });
        }

        socket.on('profileCreated', (data) => {
            myProfile = data;
            document.getElementById('reg-section').classList.add('hidden');
            document.getElementById('profile-section').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = "Profilo: " + data.user.nick;
            renderReactions(data.user.reactions);
            QRCode.toCanvas(document.getElementById('qrcode'), window.location.origin, { width: 180 });
        });

        function renderReactions(reactions) {
            const grid = document.getElementById('reaction-display');
            grid.innerHTML = '';
            icons.forEach(icon => {
                const div = document.createElement('div');
                div.className = 'item';
                div.onclick = () => sendReaction(icon);
                div.innerHTML = `<span>${icon}</span><div class="count">${reactions[icon] || 0}</div>`;
                grid.appendChild(div);
            });
        }

        function sendReaction(icon) {
            // Per ora mandiamo la reazione a noi stessi per test
            socket.emit('sendReaction', { toId: socket.id, icon: icon, fromNick: myProfile.user.nick });
        }

        socket.on('reactionUpdate', (data) => {
            if (data.toId === socket.id) renderReactions(data.reactions);
            const log = document.getElementById('interaction-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = data.log;
            log.prepend(entry);
        });

        socket.on('timerStarted', (endTime) => {
            setInterval(() => {
                const diff = endTime - Date.now();
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerText = `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            }, 1000);
        });
    </script>
</body>
</html>
