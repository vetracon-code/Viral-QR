<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #D4AF37; --primary: #1A237E; --danger: #C62828; }
        body { font-family: -apple-system, sans-serif; margin:0; background: #f0f2f5; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; position: relative; z-index: 1000; }
        #map { height: 400px; width: 100%; background: #eee; border-bottom: 3px solid var(--accent); }
        .content { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 1rem; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .stats { position: absolute; top: 5px; right: 10px; font-size: 0.8rem; opacity: 0.8; }
        #qr-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <div id="qr-overlay" onclick="this.style.display='none'">
        <canvas id="qr-canvas"></canvas>
        <p>Tocca per chiudere</p>
    </div>

    <div class="header">
        <div id="user-count" class="stats">Online: 0</div>
        <h2 id="display-title" style="margin:0; font-size: 1.2rem;">LUMINA</h2>
        <div id="timer-display" style="color:var(--accent); font-size: 0.9rem;">Configurazione Host...</div>
    </div>

    <div id="map"></div>

    <div class="content">
        <div id="admin-setup" class="card hidden">
            <h3 style="margin-top:0">Pannello Host</h3>
            <label style="font-size: 0.8rem; font-weight: bold;">NOME EVENTO</label>
            <input type="text" id="adm-event-name" placeholder="Es: Festa in Giardino">
            
            <label style="font-size: 0.8rem; font-weight: bold;">IL TUO NICKNAME DA GIOCATORE</label>
            <input type="text" id="adm-nick" placeholder="Inserisci il tuo nome nel gioco">
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            <p style="font-size: 0.8rem; color: #666;">Imposta il centro del gioco:</p>
            
            <button class="btn" style="background:#28a745" onclick="setupGPS()">USA MIA POSIZIONE E INIZIA</button>
            
            <input type="text" id="adm-address" placeholder="Oppure inserisci un indirizzo">
            <button class="btn" style="background:var(--primary)" onclick="setupAddr()">USA INDIRIZZO E INIZIA</button>
        </div>

        <div id="player-reg" class="card">
            <h3>Benvenuto</h3>
            <p>Inserisci il tuo nome per partecipare alla sessione attiva.</p>
            <input type="text" id="nickname" placeholder="Tuo Nickname">
            <button class="btn" onclick="joinAsPlayer()">ENTRA NEL GIOCO</button>
        </div>

        <div id="main-dashboard" class="hidden">
            <div class="card">
                <h3 id="user-hello" style="margin-top:0; color:var(--primary);"></h3>
                <button class="btn" onclick="showQR()">MOSTRA IL MIO QR</button>
                
                <div id="admin-powers" class="hidden" style="margin-top:20px; border-top:2px solid #eee; padding-top:15px;">
                    <p style="font-size: 0.7rem; color:red; font-weight:bold;">CONTROLLI HOST:</p>
                    <button class="btn" style="background:#444" onclick="toggleSetup()">MODIFICA EVENTO / AREA</button>
                    <button class="btn" style="background:var(--danger)" onclick="resetAll()">RESET TOTALE SESSIONE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const socket = io();
        let map, isAdmin = false, myId = "", markers = {};

        // Inizializzazione Mappa
        map = L.map('map', { zoomControl: false }).setView([45.4642, 9.1900], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        if (window.location.search.includes('admin')) {
            isAdmin = true;
            document.getElementById('admin-setup').classList.remove('hidden');
            document.getElementById('player-reg').classList.add('hidden');
        }

        function setupGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                completeSetup(p.coords.latitude, p.coords.longitude);
            }, () => alert("Errore GPS. Controlla i permessi."));
        }

        async function setupAddr() {
            const addr = document.getElementById('adm-address').value;
            if(!addr) return alert("Inserisci un indirizzo");
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`);
            const data = await res.json();
            if(data.length > 0) completeSetup(parseFloat(data[0].lat), parseFloat(data[0].lon));
            else alert("Indirizzo non trovato");
        }

        function completeSetup(lat, lng) {
            const eventName = document.getElementById('adm-event-name').value || "Lumina";
            const hostNick = document.getElementById('adm-nick').value || "Host";
            
            socket.emit('adminStart', { name: eventName, value: 60, unit: "min", lat, lng });
            socket.emit('registerUser', { nick: hostNick, lat, lng });
            
            document.getElementById('admin-setup').classList.add('hidden');
            map.setView([lat, lng], 16);
        }

        function joinAsPlayer() {
            navigator.geolocation.getCurrentPosition(p => {
                const nick = document.getElementById('nickname').value || "Giocatore";
                socket.emit('registerUser', { nick, lat: p.coords.latitude, lng: p.coords.longitude });
                document.getElementById('player-reg').classList.add('hidden');
                map.setView([p.coords.latitude, p.coords.longitude], 16);
            }, () => alert("Attiva il GPS per giocare"));
        }

        socket.on('profileCreated', d => {
            myId = d.id;
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-hello').innerText = "In gioco come: " + d.user.nick;
            if(isAdmin) document.getElementById('admin-powers').classList.remove('hidden');
        });

        socket.on('updateStats', count => {
            document.getElementById('user-count').innerText = "Online: " + count;
        });

        socket.on('updateMap', users => {
            Object.values(users).forEach(u => {
                if(u.id !== socket.id) {
                    if(markers[u.id]) {
                        markers[u.id].setLatLng([u.lat, u.lng]);
                    } else {
                        markers[u.id] = L.marker([u.lat, u.lng]).addTo(map).bindPopup(u.nick);
                    }
                }
            });
        });

        socket.on('timerStarted', d => {
            document.getElementById('display-title').innerText = d.name;
            document.getElementById('timer-display').innerText = "Sessione Attiva";
        });

        function showQR() {
            QRCode.toCanvas(document.getElementById('qr-canvas'), window.location.origin + "/?target=" + myId, { width: 250 });
            document.getElementById('qr-overlay').style.display = "flex";
        }

        function toggleSetup() {
            document.getElementById('admin-setup').classList.toggle('hidden');
        }

        function resetAll() {
            if(confirm("RESET TOTALE: Questa azione espellerà tutti i giocatori. Continuare?")) {
                socket.emit('adminRequestReset');
            }
        }

        socket.on('gameDeleted', () => {
            location.href = window.location.origin + (isAdmin ? "?admin=1" : "");
        });
    </script>
</body>
</html>
